# 分开部署一键启动：API、定时任务调度器、Redis 各自独立容器。
#
# 用法：
#   export TA_APP_SECRET_KEY=$(openssl rand -base64 32)
#   docker compose -f docker-compose.split.yml up -d
#
# 两个应用容器通过 TA_DISABLE_* 选择角色（见 guide/deployment.md），
# 通过共享数据卷与 REDIS_URL 共享任务状态。
# 注意：同一数据库不要在这套 compose 之外再运行其他调度器实例。

services:
  redis:
    image: redis:7-alpine
    container_name: tradingagents-redis
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/kylinmountain/tradingagents-ashare:latest
    # 从源码构建镜像时：注释掉上面的 image，改用下行
    # build: .
    container_name: tradingagents-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: sqlite:///./data/tradingagents.db
      REDIS_URL: redis://redis:6379/0
      TA_DISABLE_SCHEDULER: "1"
      TA_APP_SECRET_KEY: ${TA_APP_SECRET_KEY:?请先设置 TA_APP_SECRET_KEY，如 export TA_APP_SECRET_KEY=$(openssl rand -base64 32)}
      # 常用可选变量（取消注释并填值；完整清单见 guide/configuration.md）：
      # TA_API_KEY: "你的 LLM API Key"
      # TA_BASE_URL: "https://api.openai.com/v1"
      # TA_LLM_PROVIDER: "openai"
      # MAIL_HOST: "smtp.gmail.com"

  scheduler:
    image: ghcr.io/kylinmountain/tradingagents-ashare:latest
    # 从源码构建镜像时：注释掉上面的 image，改用下行
    # build: .
    container_name: tradingagents-scheduler
    restart: always
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: sqlite:///./data/tradingagents.db
      REDIS_URL: redis://redis:6379/0
      TA_DISABLE_API: "1"
      SCHEDULER_CONCURRENCY: "3"
      TA_APP_SECRET_KEY: ${TA_APP_SECRET_KEY:?请先设置 TA_APP_SECRET_KEY，如 export TA_APP_SECRET_KEY=$(openssl rand -base64 32)}

volumes:
  redis-data:
